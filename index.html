<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-hold">
        <img id="imageofinsta" src="https://crystalpng.com/wp-content/uploads/2025/06/Instagram-03.png" alt="Instagram Logo">
        
        <div class="text-img-holder">
            <div class="text-holder">
                <h1>See everyday moments from your <span id="homeeee">close friends</span></h1>
            </div>

            <div class="img-holder">
                <img src="https://static.cdninstagram.com/rsrc.php/yR/r/92ZsVHNkyvf.webp" alt="Instagram Mockup">
            </div>
        </div>

        <div class="sigin-form-holder">
            <form action="">
                <h2 class="h2oflogin">Log into Instagram</h2>
                <input type="text" placeholder="Mobile number, username or email">
                <input type="password" placeholder="Password">
                
                <div class="login-forget"> 
                    <button id="login" type="submit">Log in</button>
                    <button id="forget-password" type="button">Forget Password?</button>
                </div>
                
                <div class="login-fb-create">
                    <button type="button">Log in with Facebook</button>
                    <button type="button">Create new account</button>
                </div>
            </form>
        </div>

        <footer>
            </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
